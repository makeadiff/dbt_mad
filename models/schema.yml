models:
  - name: school_data_comparison
    description: Comprehensive view of all schools with CO details and child count metrics. Includes schools from CRM (with converted agreements) and schools only in Bubble system.
    columns:
      - name: "Partner ID"
        description: Unique identifier for the partner (CRM ID for CRM schools, Bubble ID for Bubble-only schools)
      - name: "Partner Name"
        description: Name of the partner organization
      - name: "CO ID"
        description: User ID of the Community Organizer who created the partner
      - name: "CO Name"
        description: Display name of the Community Organizer
      - name: "MOU Sign Date"
        description: Date when the MOU was signed
      - name: "Weeks Since MOU Signed"
        description: Number of weeks elapsed since the MOU was signed (calculated as floor of days difference divided by 7)
      - name: "Confirmed Child Count (CRM)"
        description: Number of children confirmed in CRM (from partner agreements)
      - name: "Active Child Count (Bubble)"
        description: Number of active children in Bubble system
      - name: "Dropped Child Count (Bubble)"
        description: Number of dropped/inactive children in Bubble system
      - name: "Platform Presence"
        description: Platform presence of the school - 'BOTH' for schools in both CRM and Bubble, 'CRM' for schools only in CRM, 'BUBBLE' for schools only in Bubble
      - name: "CRM Status"
        description: Numeric indicator for CRM presence - 100 for schools in CRM (CRM or BOTH), 0 for Bubble-only schools
      - name: "Child Count Ratio (Bubble / CRM)"
        description: Percentage ratio of active children in Bubble divided by confirmed children in CRM, multiplied by 100. Values > 100 indicate Bubble has more children, < 100 indicate fewer, = 100 indicates perfect match. NULL for schools without CRM data.

  - name: volunteer_recruitment_data
    description: Volunteer recruitment data with partner details, CO information, child counts, and volunteer metrics including recruitment targets and assignments
    columns:
      - name: partner_id
        description: Unique identifier for the partner organization (NULL for unassigned volunteers)
      - name: partner_name
        description: Name of the partner organization ('Unassigned' for volunteers not yet assigned to any school)
      - name: co_id
        description: User ID of the Community Organizer who created the partner
      - name: co_name
        description: Display name of the Community Organizer
      - name: active_child_count
        description: Number of active children enrolled at this partner/school from Bubble system
      - name: volunteers_required
        description: Calculated number of volunteers required (4/5 times the active child count)
      - name: volunteers_assigned_to_school
        description: Number of volunteers assigned to this specific school (for unassigned rows, shows count of unassigned volunteers)
      - name: volunteers_assigned_to_class
        description: Number of volunteers assigned to classes at this school (through slot assignments)

  - name: master_mapping_sheet_int
    description: Row-by-row validated intermediate model for master_mapping_sheet. Every source row is retained; invalid rows are labelled via validation columns. Downstream marts should filter WHERE validation_status = true.
    columns:
      - name: city_name
        description: City where the chapter operates
      - name: state
        description: State where the chapter operates
      - name: co_id
        description: Community Organizer ID (integer cast from source)
      - name: co_name
        description: Community Organizer display name
      - name: chapter_id
        description: Chapter identifier — numeric string for E2 (e.g. '171'), alphanumeric for E1 (e.g. 'E1_Ahm_01')
      - name: chapter_name
        description: Chapter display name
      - name: worknode_id
        description: Worknode identifier (integer cast from source)
      - name: cho_id
        description: Chapter Head Organizer ID (integer cast from source)
      - name: cho_name
        description: Chapter Head Organizer display name
      - name: engine
        description: Programme engine — valid values are E1 or E2
      - name: chapter_status
        description: Operational status of the chapter — valid values are Active, Dropped out, Pending status
      - name: cho_status
        description: Status of the Chapter Head Organizer
      - name: sourcing_campaign_code
        description: Unique sourcing campaign code assigned to the chapter
      - name: campaign_name
        description: Human-readable campaign name
      - name: fundraiser_id
        description: Fundraiser identifier — must be numeric digits only
      - name: fundraiser_name
        description: Fundraiser display name
      - name: cho_allocation_on_pc
        description: CHO allocation percentage on programme coordinator
      - name: sheet_validation_status
        description: Validation status flag from the Google Sheet itself (preserved as-is from source)
      - name: sheet_validation_issues
        description: Validation issue notes from the Google Sheet itself (preserved as-is from source)
      - name: validation_status
        description: "SQL-computed row validity — true = all checks passed, false = one or more checks failed"
      - name: validation_issues
        description: Semicolon-separated list of all failed check messages for this row; NULL when validation_status is true
      - name: issue_count
        description: Count of failed checks on this row; 0 when validation_status is true
      - name: validation_run_at
        description: Timestamp of the dbt run that produced this validation result

  - name: child_attendance_int
    description: Cleaned intermediate model for child attendance session data from Google Sheets. Filters rows missing child_id, partner_id, volunteer_id, attendance, or start_date.
    columns:
      - name: child_id
        description: Child identifier (integer cast from source)
      - name: partner_id
        description: Partner/school identifier (integer cast from source)
      - name: volunteer_id
        description: Volunteer identifier (integer cast from source)
      - name: slot_class_section_id
        description: Slot or class section identifier
      - name: child_name
        description: Full name of the child
      - name: partner_name
        description: Name of the partner/school
      - name: volunteers
        description: Volunteer name(s) associated with the session
      - name: attendance
        description: Attendance status for the child (e.g. Present, Absent)
      - name: day_of_week
        description: Day of the week the session was held
      - name: current_week
        description: Week identifier within the survey cycle
      - name: survey_cycle
        description: Survey cycle period (e.g. monthly or quarterly label)
      - name: start_date
        description: Session start date
      - name: end_date
        description: Session end date
      - name: entry_started_date
        description: Timestamp when the form entry was started (ISO 8601, NULL if unparseable)
      - name: entry_last_updated_date
        description: Timestamp when the form entry was last updated (ISO 8601, NULL if unparseable)
      - name: substitute_volunteer_name
        description: Name of the substitute volunteer, if any
      - name: substitute_volunteer_mad_id
        description: MAD ID of the substitute volunteer, if any
      - name: volunteer_was_substituted
        description: Boolean flag — true if the volunteer was substituted by someone else
      - name: q1
        description: Survey answer for question 1
      - name: q2
        description: Survey answer for question 2
      - name: q3
        description: Survey answer for question 3
      - name: q4
        description: Survey answer for question 4
      - name: form_title
        description: Fillout form title (metadata)
      - name: tag_id
        description: Fillout tag identifier (metadata)
      - name: author
        description: Fillout form author (metadata)
      - name: main_subtitle
        description: Fillout form subtitle (metadata)
      - name: main_cover_image
        description: Fillout form cover image URL (metadata)
      - name: published_date
        description: Date the form was published (metadata)
      - name: last_activity_date
        description: Timestamp of last form activity (metadata, NULL if unparseable)

